<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal - Meditation App</title>
    <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #111; margin-bottom: 40px; }
    .tabs { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        background: #fff; 
        border-radius: 12px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        overflow: hidden; 
    }
    .tabs input[type="radio"] { display: none; }
    

    .tabs label { 
        padding: 20px; 
        text-align: center; 
        cursor: pointer; 
        font-weight: 600; 
        transition: 0.3s; 
        border-bottom: 2px solid transparent; 
        color: #666; 
        grid-column: auto;
    }
    .tabs .tab-content { 
        display: none; 
        padding: 30px; 
        border-top: 1px solid #eee; 
        background: #fff; 
        grid-column: 1 / span 2; /
    }
    

    #tos:checked ~ label[for="tos"], #pp:checked ~ label[for="pp"] { color: #4CAF50; border-bottom: 2px solid #4CAF50; background: #fdfdfd; }
    

    #tos:checked ~ #tos-content, #pp:checked ~ #pp-content { 
        display: block; 
    }
</style>
</head>
<body>

    <h1>Meditation App Legal</h1>

    <div class="tabs">
        <input type="radio" name="legal" id="tos" checked>
        <label for="tos">Terms of Service</label>
        <div class="tab-content" id="tos-content">
            <h2>Terms of Service</h2>
            <p></p>
        </div>

        <input type="radio" name="legal" id="pp">
        <label for="pp">Privacy Policy</label>
        <div class="tab-content" id="pp-content">
            <h2>Privacy Policy</h2>
            <p></p>
        </div>
    </div>

</body>
</html>
